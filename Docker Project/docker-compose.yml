version: '3.8'
services:
  frontend:
    build: ./Frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - app-network
  backend:
    build: ./Backend
    ports:
      - "5000:5000"
    networks:
      - app-network
networks:
  app-network:
    driver: bridge